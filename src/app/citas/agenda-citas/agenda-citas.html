<div class="page-header">
    <h2>Agenda de citas</h2>
    <svg class="header-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M 40 180 Q 100 120, 160 180" stroke="currentColor" stroke-width="20" fill="none" stroke-linecap="round"
            stroke-linejoin="round" />
        <ellipse cx="100" cy="80" rx="35" ry="45" fill="currentColor" />
        <ellipse cx="60" cy="40" rx="18" ry="28" fill="currentColor" />
        <ellipse cx="85" cy="20" rx="16" ry="26" fill="currentColor" />
        <ellipse cx="115" cy="20" rx="16" ry="26" fill="currentColor" />
        <ellipse cx="140" cy="40" rx="18" ry="28" fill="currentColor" />
        <rect x="85" y="60" width="30" height="40" fill="white" />
        <rect x="75" y="70" width="50" height="20" fill="white" />
    </svg>
</div>
<div *ngIf="mensaje"
    style="padding:1rem;margin-bottom:1rem;border-radius:4px;background-color:var(--bg-secondary);color:#2e7d32;border-left:4px solid #2e7d32;">
    {{ mensaje }}</div>
<form [formGroup]="form" (ngSubmit)="submit()">
    <div>
        <label>Mascota</label>
        <select formControlName="mascotaId">
            <option value="">-- Selecciona una mascota --</option>
            <option *ngFor="let m of mascotas" [value]="m.id">{{m.nombre}} ({{m.dueno.nombre}})</option>
        </select>
    </div>
    <div>
        <label>Fecha y hora</label>
        <input type="datetime-local" formControlName="fecha" />
    </div>
    <div>
        <label>Motivo</label>
        <input type="text" formControlName="motivo" placeholder="Ej:Revision anual,Vacunacion" />
    </div>
    <button type="submit" class="btn-green" [disabled]="form.invalid">Agendar</button>
</form>
<h3>Citas existentes</h3>
<ul *ngIf="citas.length>0;else noCitas">
    <li *ngFor="let c of citas" [appDestacaProxima]="c.fecha"
        style="display:flex;justify-content:space-between;align-items:center;">
        <span>{{c.fecha|date:"short"}} - {{c.mascota.nombre}} ({{c.motivo}}) -
            <strong>{{c.estado|estadoCita}}</strong></span>
        <button *ngIf="c.estado!=='cancelada'&&c.estado!=='completada'" (click)="cancelarCita(c.id)"
            style="padding:0.4rem 0.8rem;background-color:#d32f2f;color:white;border:none;border-radius:4px;cursor:pointer;font-size:0.85rem;font-weight:bold;">Cancelar</button>
        <span *ngIf="c.estado==='cancelada'||c.estado==='completada'" style="color:#999;font-size:0.85rem;">-</span>
    </li>
</ul>
<ng-template #noCitas>
    <p style="color:#999;font-style:italic;">No hay citas registradas</p>
</ng-template>
